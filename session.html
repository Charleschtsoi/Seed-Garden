<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session | Seed Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./meditation.css" />
  </head>
  <body class="meditation-page">
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <button
        type="button"
        class="nav-toggle"
        aria-expanded="false"
        aria-controls="site-nav"
      >
        <span class="nav-toggle-bar" aria-hidden="true"></span>
        <span class="nav-toggle-bar" aria-hidden="true"></span>
        <span class="nav-toggle-bar" aria-hidden="true"></span>
        <span class="sr-only" data-i18n="navMenu">Menu</span>
      </button>
      <nav class="site-nav" id="site-nav" aria-label="Primary">
        <a href="./index.html" data-i18n="home">Home</a>
        <a href="./meditate.html" aria-current="page" data-i18n="meditation">Meditation</a>
        <a href="./journal.html" data-i18n="journal">Mood journaling</a>
        <a href="./account.html" data-i18n="account">My account</a>
        <a href="./sign-in.html" data-i18n="signIn">Sign in/up</a>
        <a href="./about-meditation.html" data-i18n="aboutMeditation">About meditation</a>
        <a href="./desktop-mate.html" data-i18n="desktopMate">Desktop mate</a>
        <a href="./support.html" data-i18n="support">Support us</a>
        <div class="lang-toggle" role="group" aria-label="Language">
          <button type="button" class="lang-btn is-active" data-lang="en" aria-pressed="true">EN</button>
          <button type="button" class="lang-btn" data-lang="tc" aria-pressed="false">TC</button>
        </div>
      </nav>
    </header>

    <main id="main-content" class="session-canvas">
      <p class="session-mode-label">Silence</p>

      <div class="session-stage">
        <video class="session-video" playsinline muted loop></video>
        <div class="session-video-fallback" hidden>
          <img src="./assets/mode-silence.png" alt="" />
          <p>Video arriving soon — timer ready.</p>
        </div>
      </div>

      <p class="session-timer" aria-live="polite" aria-atomic="true">45:00</p>

      <div class="session-actions">
        <button class="btn-session-play" type="button">Begin</button>
        <button class="btn-session-end" type="button">End</button>
      </div>
    </main>

    <script src="./js/i18n-labels.js"></script>
    <script src="./js/language-toggle.js"></script>
    <script src="./js/mobile-nav.js"></script>
    <script src="./js/meditation-config.js"></script>
    <script src="./js/meditation-session.js"></script>
  </body>
</html>
