<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seed Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <nav class="site-nav" aria-label="Primary">
        <a href="#" aria-current="page">Home</a>
        <a href="#sign-in">Sign in/up</a>
        <a href="#account">Account</a>
        <a href="#language" class="nav-language">
          <span class="globe" aria-hidden="true">🌐</span>
          English
        </a>
      </nav>
    </header>

    <main id="main-content" class="home-canvas">
      <section class="hero-center" aria-label="Welcome">
        <figure class="mascot-block">
          <img
            src="./assets/mascot.png"
            alt="Seed Garden mascot, a calm green stone character"
            class="mascot"
            width="180"
            height="180"
          />
          <blockquote class="speech-bubble">
            <p>&ldquo;Silence is the best reply to a fool...&rdquo;</p>
          </blockquote>
        </figure>
      </section>

      <section class="home-actions" aria-label="Main actions">
        <a class="action-tile action-meditate" href="#meditate">
          <img
            src="./assets/meditate-illustration.png"
            alt="Lotus flower with a dragonfly"
            class="action-art"
            width="280"
            height="200"
          />
          <span class="action-label">Meditate</span>
        </a>

        <a class="action-tile action-write" href="#write">
          <img
            src="./assets/write-illustration.png"
            alt="Grass, stones, and a snail"
            class="action-art"
            width="280"
            height="120"
          />
          <span class="action-label">Write</span>
        </a>
      </section>
    </main>
  </body>
</html>
