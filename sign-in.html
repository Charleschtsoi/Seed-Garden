<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in / up | Seed Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./flow.css" />
  </head>
  <body class="flow-page">
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <nav class="site-nav" aria-label="Primary">
        <a href="./index.html" data-i18n="home">Home</a>
        <a href="./meditate.html" data-i18n="meditation">Meditation</a>
        <a href="./wind-chime.html" data-i18n="windChime">Wind chime</a>
        <a href="./journal.html" data-i18n="journal">Mood journaling</a>
        <a href="./account.html" data-i18n="account">My account</a>
        <a href="./sign-in.html" aria-current="page" data-i18n="signIn">Sign in/up</a>
        <a href="./about-meditation.html" data-i18n="aboutMeditation">About meditation</a>
        <a href="./desktop-mate.html" data-i18n="desktopMate">Desktop mate</a>
        <a href="./support.html" data-i18n="support">Support us</a>
        <div class="lang-toggle" role="group" aria-label="Language">
          <button type="button" class="lang-btn is-active" data-lang="en" aria-pressed="true">EN</button>
          <button type="button" class="lang-btn" data-lang="tc" aria-pressed="false">TC</button>
        </div>
      </nav>
    </header>

    <main id="main-content" class="flow-canvas flow-canvas-wide">
      <h1 class="flow-title" data-i18n="signIn">Sign in/up</h1>
      <p class="flow-body" data-i18n="signInHint">
        Save your progress when accounts arrive, or continue gently as a guest for now.
      </p>

      <form class="static-card static-form auth-form">
        <div class="field-row">
          <label for="email" data-i18n="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" />
        </div>
        <div class="field-row">
          <label for="password" data-i18n="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" />
        </div>
        <button class="flow-primary" type="button" data-i18n="continueEmail">Continue with email</button>
      </form>

      <div class="auth-actions" aria-label="Social sign in">
        <button class="flow-secondary" type="button" data-i18n="continueGoogle">Continue with Google</button>
        <button class="flow-secondary" type="button" data-i18n="continueApple">Continue with Apple</button>
      </div>

      <a class="flow-primary" href="./meditate.html" data-i18n="continueGuest">Continue as guest</a>
      <a class="flow-secondary" href="./index.html" data-i18n="backHome">Back to Home</a>
    </main>

    <script src="./js/i18n-labels.js"></script>
    <script src="./js/language-toggle.js"></script>
  </body>
</html>
